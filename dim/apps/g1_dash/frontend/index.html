<!doctype html>
<!--
  G1 Dash — onboard controller panel for a Unitree G1 humanoid.

  The native half runs on the robot's Jetson (see ../g1_helper_cpp, launched by
  ../main.js): a C++ helper reading the MID360 lidar (Livox), the RealSense
  camera, and the G1's own state/locomotion over unitree_sdk2. This file is the
  browser panel — it renders the live camera, a 3D lidar point cloud, telemetry
  (battery, IMU, joint heat, proximity), and sends drive + gait commands back
  down over the app-bus.

    keyboard:  W/S forward·back   A/D strafe   Q/E turn   Shift boost   Space E-STOP
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>G1 Dash · DimOS</title>
<link rel="stylesheet" href="/assets/theme.css" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body { color: var(--fg); background: #06080c; font-family: var(--sans, system-ui, sans-serif); }

  /* ── camera fills the whole stage; everything else floats over it ── */
  .stage { position: fixed; inset: 0; background: #06080c; }
  .cam-wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #cam { max-width: 100%; max-height: 100%; object-fit: contain; display: none; image-rendering: auto; }
  .cam-wrap.live #cam { display: block; }
  .cam-ph { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px; color: var(--muted-fg); font-size: 13px; text-align: center; padding: 24px; }
  .cam-wrap.live .cam-ph { display: none; }
  .cam-ph .glyph { font-size: 46px; opacity: .4; }

  /* subtle vignette so overlays stay readable over a bright frame */
  .vignette { position: absolute; inset: 0; pointer-events: none; z-index: 1;
    background:
      linear-gradient(to bottom, rgba(0,0,0,.55), transparent 22%, transparent 72%, rgba(0,0,0,.6)),
      linear-gradient(to right, rgba(0,0,0,.35), transparent 16%, transparent 84%, rgba(0,0,0,.35)); }

  /* ── top bar ── */
  .topbar { position: absolute; top: 0; left: 0; right: 0; z-index: 10; display: flex; align-items: center;
    gap: 12px; padding: 12px 14px; pointer-events: none; }
  .topbar > * { pointer-events: auto; }
  .brand { display: flex; align-items: center; gap: 9px; }
  .brand .mark { width: 26px; height: 26px; color: var(--primary); }
  .brand .name { font-size: 15px; font-weight: 700; letter-spacing: .06em; color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,.7); }
  .spacer { flex: 1; }

  .pill { display: inline-flex; align-items: center; gap: 7px; font-size: 11px; font-weight: 600;
    letter-spacing: .04em; text-transform: uppercase; color: rgba(255,255,255,.85);
    background: color-mix(in oklch, black 46%, transparent); backdrop-filter: blur(4px);
    border: 1px solid color-mix(in oklch, white 16%, transparent); border-radius: 999px; padding: 5px 11px; }
  .pill .d { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .pill.ok { color: color-mix(in oklch, var(--ok) 62%, white); }
  .pill.warn { color: color-mix(in oklch, #f4b740 70%, white); }
  .pill.err { color: color-mix(in oklch, var(--danger) 60%, white); }
  .pill.err .d, .pill.warn .d { animation: pulse 1s ease-in-out infinite; }

  /* per-subsystem dots (unitree / lidar / camera) */
  .subs { display: inline-flex; align-items: center; gap: 10px; font-size: 10px; letter-spacing: .05em;
    text-transform: uppercase; color: rgba(255,255,255,.7);
    background: color-mix(in oklch, black 46%, transparent); backdrop-filter: blur(4px);
    border: 1px solid color-mix(in oklch, white 16%, transparent); border-radius: 999px; padding: 5px 12px; }
  .subs .s { display: inline-flex; align-items: center; gap: 5px; }
  .subs .s .d { width: 7px; height: 7px; border-radius: 50%; background: var(--muted-fg); }
  .subs .s.up .d { background: var(--ok); }
  .subs .s.down .d { background: color-mix(in oklch, var(--danger) 80%, black); }

  .mode { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; letter-spacing: .05em;
    text-transform: uppercase; color: rgba(255,255,255,.82);
    background: color-mix(in oklch, black 46%, transparent); backdrop-filter: blur(4px);
    border: 1px solid color-mix(in oklch, white 16%, transparent); border-radius: 999px; padding: 5px 12px; }
  .mode.walking { color: color-mix(in oklch, var(--primary) 65%, white); border-color: color-mix(in oklch, var(--primary) 40%, transparent); }
  .mode.damp, .mode.zerotorque { color: color-mix(in oklch, #f4b740 74%, white); }

  .estop { appearance: none; cursor: pointer; font: inherit; font-size: 12px; font-weight: 800;
    letter-spacing: .08em; text-transform: uppercase; color: #fff;
    background: color-mix(in oklch, var(--danger) 82%, black); border: 1px solid color-mix(in oklch, white 30%, transparent);
    border-radius: var(--radius); padding: 8px 15px; box-shadow: 0 6px 20px -8px rgba(220,40,40,.8);
    transition: transform .1s, background .14s; }
  .estop:hover { background: var(--danger); }
  .estop:active { transform: translateY(1px) scale(.98); }

  /* ── left telemetry rail ── */
  .rail { position: absolute; left: 14px; top: 64px; z-index: 8; width: 226px;
    display: flex; flex-direction: column; gap: 10px; }
  .card { background: color-mix(in oklch, #0c1017 74%, transparent); backdrop-filter: blur(7px);
    border: 1px solid color-mix(in oklch, white 12%, transparent); border-radius: calc(var(--radius) * 1.3);
    padding: 12px 13px; box-shadow: 0 12px 34px -18px rgba(0,0,0,.7); }
  .card h3 { margin: 0 0 9px; font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted-fg); }

  .batt { display: flex; align-items: center; gap: 10px; }
  .batt .bar { flex: 1; height: 10px; border-radius: 999px; background: color-mix(in oklch, white 10%, transparent);
    overflow: hidden; border: 1px solid color-mix(in oklch, white 12%, transparent); }
  .batt .fill { height: 100%; width: 0%; border-radius: 999px; background: var(--ok);
    transition: width .4s ease, background .4s; }
  .batt .fill.low { background: #f4b740; } .batt .fill.crit { background: var(--danger); }
  .batt .pct { font-family: var(--mono); font-size: 13px; font-weight: 600; color: #fff; min-width: 40px; text-align: right; }
  .batt-sub { margin-top: 6px; font-family: var(--mono); font-size: 10.5px; color: var(--muted-fg);
    display: flex; justify-content: space-between; }

  .kv { display: grid; grid-template-columns: 1fr auto; gap: 3px 8px; font-size: 12px; }
  .kv .k { color: var(--muted-fg); }
  .kv .v { font-family: var(--mono); color: #fff; text-align: right; }
  .kv .v.hot { color: var(--danger); }
  .kv .v.near { color: #f4b740; }

  /* attitude horizon (roll/pitch) */
  .horizon { position: relative; height: 84px; border-radius: var(--radius); overflow: hidden;
    background: linear-gradient(#1a2740, #0a1220); border: 1px solid color-mix(in oklch, white 10%, transparent); }
  .horizon .sky { position: absolute; inset: -40% -40%; background: linear-gradient(#2b4a7a 49.6%, #6b4a2b 50.4%);
    transform-origin: center; }
  .horizon .cross { position: absolute; left: 50%; top: 50%; width: 46px; height: 1px; background: var(--primary);
    transform: translate(-50%, -50%); box-shadow: 0 0 6px var(--primary); }
  .horizon .cross::before { content: ""; position: absolute; left: 50%; top: 50%; width: 1px; height: 14px;
    background: var(--primary); transform: translate(-50%, -50%); }
  .horizon .yaw { position: absolute; left: 0; right: 0; bottom: 3px; text-align: center;
    font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,.75); text-shadow: 0 1px 2px #000; }

  /* ── lidar point-cloud card (bottom-left, above rail overflow) ── */
  .lidar-card { position: absolute; left: 14px; bottom: 14px; z-index: 8; width: 260px; height: 210px;
    padding: 0; overflow: hidden; }
  .lidar-card.big { width: min(60vw, 720px); height: min(64vh, 560px); }
  .lidar-card canvas { display: block; width: 100% !important; height: 100% !important; }
  .lidar-head { position: absolute; top: 0; left: 0; right: 0; z-index: 2; display: flex; align-items: center;
    gap: 8px; padding: 8px 10px; pointer-events: none;
    background: linear-gradient(to bottom, rgba(4,8,14,.8), transparent); }
  .lidar-head h3 { margin: 0; }
  .lidar-head .m { font-family: var(--mono); font-size: 10.5px; color: var(--muted-fg); }
  .lidar-head .expand { pointer-events: auto; margin-left: auto; appearance: none; cursor: pointer; font: inherit;
    font-size: 11px; color: rgba(255,255,255,.8); background: color-mix(in oklch, black 40%, transparent);
    border: 1px solid color-mix(in oklch, white 16%, transparent); border-radius: var(--radius); padding: 3px 8px; }
  .lidar-head .expand:hover { color: #fff; border-color: var(--ring); }

  /* ── command dock (bottom center) ── */
  .dock { position: absolute; left: 50%; bottom: 16px; transform: translateX(-50%); z-index: 9;
    display: flex; align-items: center; gap: 8px; max-width: min(62%, 780px);
    overflow-x: auto; padding: 6px; scrollbar-width: thin;
    -webkit-mask-image: linear-gradient(to right, transparent, black 16px, black calc(100% - 16px), transparent);
    mask-image: linear-gradient(to right, transparent, black 16px, black calc(100% - 16px), transparent); }
  .dock::-webkit-scrollbar { height: 6px; }
  .dock::-webkit-scrollbar-thumb { background: color-mix(in oklch, white 22%, transparent); border-radius: 3px; }
  .act { appearance: none; cursor: pointer; font: inherit; font-size: 12px; font-weight: 600; letter-spacing: .03em;
    white-space: nowrap; flex: 0 0 auto; color: #fff; background: color-mix(in oklch, black 44%, transparent);
    backdrop-filter: blur(4px); border: 1px solid color-mix(in oklch, white 16%, transparent);
    border-radius: var(--radius); padding: 9px 14px; transition: background .14s, border-color .14s; }
  .act:hover { background: color-mix(in oklch, black 28%, transparent); border-color: var(--ring); }
  .act:active { transform: translateY(1px); }
  .act.good { border-color: color-mix(in oklch, var(--ok) 55%, transparent); color: color-mix(in oklch, var(--ok) 70%, white); }
  .act.warn { border-color: color-mix(in oklch, #f4b740 55%, transparent); color: color-mix(in oklch, #f4b740 78%, white); }

  /* ── drive d-pad (bottom right) ── */
  .dpad { position: absolute; right: 16px; bottom: 16px; z-index: 9;
    display: grid; grid-template-columns: repeat(3, 46px); grid-template-rows: repeat(3, 46px); gap: 6px; }
  .db { appearance: none; cursor: pointer; user-select: none; touch-action: none; font: inherit; font-size: 16px;
    color: #fff; background: color-mix(in oklch, black 50%, transparent); backdrop-filter: blur(4px);
    border: 1px solid color-mix(in oklch, white 15%, transparent); border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center; }
  .db:hover { background: color-mix(in oklch, black 38%, transparent); }
  .db.held { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); }
  .db.fwd { grid-area: 1 / 2 ; } .db.back { grid-area: 3 / 2; }
  .db.sl { grid-area: 2 / 1; } .db.sr { grid-area: 2 / 3; }
  .db.tl { grid-area: 1 / 1; } .db.tr { grid-area: 1 / 3; }
  .db.stop { grid-area: 2 / 2; font-size: 11px; font-weight: 700; letter-spacing: .04em; }

  .vel { position: absolute; right: 16px; bottom: 168px; z-index: 9; font-family: var(--mono); font-size: 10.5px;
    color: #fff; background: color-mix(in oklch, black 52%, transparent); backdrop-filter: blur(4px);
    border: 1px solid color-mix(in oklch, white 14%, transparent); border-radius: var(--radius); padding: 6px 9px;
    min-width: 128px; }
  .vel.on { border-color: color-mix(in oklch, var(--primary) 60%, transparent); }
  .vel .row { display: flex; justify-content: space-between; gap: 10px; }

  /* transient warning toast */
  .toast { position: absolute; left: 50%; top: 60px; transform: translate(-50%, -14px); z-index: 20;
    max-width: min(440px, 88vw); padding: 11px 16px; font-size: 13px; font-weight: 600; line-height: 1.35;
    color: #fff; text-align: center; background: color-mix(in oklch, #b4460b 82%, black); backdrop-filter: blur(4px);
    border: 1px solid color-mix(in oklch, white 24%, transparent); border-radius: var(--radius);
    box-shadow: 0 10px 30px -10px rgba(0,0,0,.6); opacity: 0; pointer-events: none;
    transition: opacity .18s ease, transform .18s ease; }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }

  @keyframes pulse { 0%,100% { opacity: .35 } 50% { opacity: 1 } }
</style>
</head>
<body>
  <div class="stage">
    <div class="cam-wrap" id="cam-wrap">
      <img id="cam" alt="G1 camera" />
      <div class="cam-ph" id="cam-ph">
        <div class="glyph">◉</div>
        <div id="cam-ph-text">Waiting for the onboard helper…</div>
      </div>
    </div>
    <div class="vignette"></div>

    <div class="topbar">
      <div class="brand">
        <svg class="mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="4.5" r="2.1"/><path d="M12 6.6 v7.2"/><path d="M6.2 9.3 h11.6"/>
          <path d="M9.2 20.5 L12 13.8 L14.8 20.5"/>
        </svg>
        <span class="name">G1</span>
      </div>
      <div class="pill err" id="link"><span class="d"></span><span id="link-t">Connecting…</span></div>
      <div class="subs" id="subs">
        <span class="s" id="s-unitree"><span class="d"></span>SDK</span>
        <span class="s" id="s-lidar"><span class="d"></span>MID360</span>
        <span class="s" id="s-camera"><span class="d"></span>RS</span>
      </div>
      <div class="mode" id="mode">—</div>
      <div class="spacer"></div>
      <button class="estop" id="estop" title="Zero velocity + Damp (Space)">E-STOP</button>
    </div>

    <div class="rail">
      <div class="card">
        <h3>Battery</h3>
        <div class="batt">
          <div class="bar"><div class="fill" id="batt-fill"></div></div>
          <div class="pct" id="batt-pct">—</div>
        </div>
        <div class="batt-sub"><span id="batt-v">— V</span><span id="batt-a">— A</span></div>
      </div>

      <div class="card">
        <h3>Attitude</h3>
        <div class="horizon">
          <div class="sky" id="horizon-sky"></div>
          <div class="cross"></div>
          <div class="yaw" id="horizon-yaw">yaw —°</div>
        </div>
        <div class="kv" style="margin-top:9px">
          <span class="k">roll</span><span class="v" id="v-roll">—</span>
          <span class="k">pitch</span><span class="v" id="v-pitch">—</span>
        </div>
      </div>

      <div class="card">
        <h3>Health</h3>
        <div class="kv">
          <span class="k">hottest joint</span><span class="v" id="v-temp">—</span>
          <span class="k">nearest obst.</span><span class="v" id="v-near">—</span>
          <span class="k">center depth</span><span class="v" id="v-depth">—</span>
          <span class="k">lidar pts/s</span><span class="v" id="v-pts">—</span>
        </div>
      </div>
    </div>

    <div class="card lidar-card" id="lidar-card">
      <div class="lidar-head">
        <h3>MID360</h3>
        <span class="m" id="lidar-m">—</span>
        <button class="expand" id="lidar-expand">Expand</button>
      </div>
      <canvas id="lidar-canvas"></canvas>
    </div>

    <div class="vel" id="vel">
      <div class="row"><span>vx</span><span id="vx">0.00</span></div>
      <div class="row"><span>vy</span><span id="vy">0.00</span></div>
      <div class="row"><span>ω</span><span id="vw">0.00</span></div>
    </div>

    <div class="dpad">
      <button class="db tl"  data-drive="tl" title="turn left (Q)">↺</button>
      <button class="db fwd" data-drive="fwd" title="forward (W)">▲</button>
      <button class="db tr"  data-drive="tr" title="turn right (E)">↻</button>
      <button class="db sl"  data-drive="sl" title="strafe left (A)">◀</button>
      <button class="db stop" id="db-stop" title="stop">STOP</button>
      <button class="db sr"  data-drive="sr" title="strafe right (D)">▶</button>
      <button class="db back" data-drive="back" title="back (S)">▼</button>
    </div>

    <div class="dock" id="dock"></div>
    <div class="toast" id="toast"></div>
  </div>

<script type="module">
import { DimAppFrontend } from "https://esm.sh/gh/jeff-hykin/dim-app@v0.3.0/frontend.js"
import * as THREE from "https://esm.sh/three@0.160.0"
import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js"

// follow the shell's light/dark like the other dim apps
;(function () { const m = matchMedia("(prefers-color-scheme: light)"); const a = () => document.body.classList.toggle("dark", !m.matches); a(); m.addEventListener("change", a) })()

const dimApp = new DimAppFrontend()

// ── drive tuning ──
const MAX_VX = 0.6      // m/s forward
const MAX_VY = 0.4      // m/s strafe
const MAX_OMEGA = 0.9   // rad/s yaw
const BOOST = 1.6       // Shift multiplier
const SEND_HZ = 15      // move-command rate while driving

// gait / posture buttons — name is the helper command, class tints it
const COMMANDS = [
  { name: "start",        label: "Start",        cls: "good" },
  { name: "balancestand", label: "Balance",      cls: "good" },
  { name: "highstand",    label: "High Stand",   cls: "" },
  { name: "lowstand",     label: "Low Stand",    cls: "" },
  { name: "squat2standup",label: "Stand Up",     cls: "" },
  { name: "sit",          label: "Sit",          cls: "" },
  { name: "wavehand",     label: "Wave",         cls: "" },
  { name: "shakehand",    label: "Shake",        cls: "" },
  { name: "zerotorque",   label: "Zero Torque",  cls: "warn" },
  { name: "damp",         label: "Damp",         cls: "warn" },
]

const els = {
  camWrap: document.getElementById("cam-wrap"),
  cam: document.getElementById("cam"),
  camPhText: document.getElementById("cam-ph-text"),
  link: document.getElementById("link"), linkT: document.getElementById("link-t"),
  sUnitree: document.getElementById("s-unitree"),
  sLidar: document.getElementById("s-lidar"),
  sCamera: document.getElementById("s-camera"),
  mode: document.getElementById("mode"),
  estop: document.getElementById("estop"),
  battFill: document.getElementById("batt-fill"), battPct: document.getElementById("batt-pct"),
  battV: document.getElementById("batt-v"), battA: document.getElementById("batt-a"),
  horizonSky: document.getElementById("horizon-sky"), horizonYaw: document.getElementById("horizon-yaw"),
  vRoll: document.getElementById("v-roll"), vPitch: document.getElementById("v-pitch"),
  vTemp: document.getElementById("v-temp"), vNear: document.getElementById("v-near"),
  vDepth: document.getElementById("v-depth"), vPts: document.getElementById("v-pts"),
  lidarCard: document.getElementById("lidar-card"), lidarExpand: document.getElementById("lidar-expand"),
  lidarM: document.getElementById("lidar-m"), lidarCanvas: document.getElementById("lidar-canvas"),
  vel: document.getElementById("vel"), vx: document.getElementById("vx"), vy: document.getElementById("vy"), vw: document.getElementById("vw"),
  dock: document.getElementById("dock"), toast: document.getElementById("toast"),
}

let helperReady = false
let camObjectUrl = null   // revoke the previous frame's blob URL

// ── toast ──
let toastTimer = null
function toast(text) {
  els.toast.textContent = text
  els.toast.classList.add("show")
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => els.toast.classList.remove("show"), 2600)
}

// ── command dock ──
for (const cmd of COMMANDS) {
  const button = document.createElement("button")
  button.className = "act " + cmd.cls
  button.textContent = cmd.label
  button.onclick = () => {
    if (!helperReady) return toast("Helper not connected yet")
    dimApp.send("cmd", { name: cmd.name })
    toast(cmd.label)
  }
  els.dock.appendChild(button)
}

els.estop.onclick = () => { dimApp.send("estop", {}); toast("E-STOP — damping") }

// ── status / link rendering ──
function setSub(el, up) {
  el.classList.toggle("up", up === true)
  el.classList.toggle("down", up === false)
}
function renderStatus(status) {
  if (!status) return
  setSub(els.sUnitree, status.unitree)
  setSub(els.sLidar, status.lidar)
  setSub(els.sCamera, status.camera)
}
function renderLink() {
  if (!helperReady) {
    els.link.className = "pill err"; els.linkT.textContent = "Helper down"
  } else {
    els.link.className = "pill ok"; els.linkT.textContent = "Onboard"
  }
}

// ── telemetry rendering ──
function renderState(s) {
  if (!s) return
  // battery
  if (typeof s.battery === "number" && s.battery >= 0) {
    const pct = Math.round(s.battery * 100)
    els.battFill.style.width = pct + "%"
    els.battFill.className = "fill" + (pct < 15 ? " crit" : pct < 35 ? " low" : "")
    els.battPct.textContent = pct + "%"
  }
  if (typeof s.voltage === "number") els.battV.textContent = s.voltage.toFixed(1) + " V"
  if (typeof s.current === "number") els.battA.textContent = s.current.toFixed(1) + " A"

  // attitude
  if (Array.isArray(s.rpy)) {
    const [roll, pitch, yaw] = s.rpy
    els.vRoll.textContent = (roll * 180 / Math.PI).toFixed(1) + "°"
    els.vPitch.textContent = (pitch * 180 / Math.PI).toFixed(1) + "°"
    els.horizonYaw.textContent = "yaw " + (yaw * 180 / Math.PI).toFixed(0) + "°"
    // roll rotates the sky, pitch slides it vertically
    const pitchPx = Math.max(-40, Math.min(40, (pitch * 180 / Math.PI) * 1.4))
    els.horizonSky.style.transform = `rotate(${(-roll * 180 / Math.PI).toFixed(1)}deg) translateY(${pitchPx.toFixed(0)}px)`
  }

  // health
  if (typeof s.hottestTemp === "number" && s.hottestTemp >= 0) {
    els.vTemp.textContent = s.hottestTemp.toFixed(0) + "°C" + (s.hottestJoint >= 0 ? ` (#${s.hottestJoint})` : "")
    els.vTemp.className = "v" + (s.hottestTemp > 75 ? " hot" : "")
  }

  // mode badge
  if (s.mode) {
    els.mode.textContent = s.mode
    els.mode.className = "mode " + (s.mode === "walking" ? "walking" : (s.mode === "damp" || s.mode === "zerotorque") ? "damp" : "")
  }
}

// ── event bus from the backend ──
dimApp.receiveRequest((tag, msg) => {
  if (tag === "g1") return onG1(msg)
  if (tag === "lcm") return onLcm(msg)
})

function onG1(msg) {
  switch (msg.type) {
    case "status":
      // backend's own status wrapper: { ready, status, state }
      if (typeof msg.ready === "boolean") { helperReady = msg.ready; renderLink() }
      if (msg.status) renderStatus(msg.status)
      if (msg.state) renderState(msg.state)
      // helper's own status event: { unitree, lidar, camera, iface }
      if ("unitree" in msg) renderStatus(msg)
      break
    case "ready": helperReady = true; renderLink(); els.camPhText.textContent = "Camera stream starting…"; break
    case "state": renderState(msg); break
    case "lidar": onLidar(msg); break
    case "frame": onFrame(msg); break
    case "log": break
    case "error": toast(msg.msg || "helper error"); break
  }
}

// optional dimos LCM streams (forwarded by the backend) — surface unknown ones as a hint
function onLcm(msg) { /* room for future LCM-driven widgets (odom, costmap, …) */ }

// ── camera frames (base64 JPEG → blob URL on an <img>) ──
function onFrame(msg) {
  if (!msg.jpeg) return
  const bytes = Uint8Array.from(atob(msg.jpeg), (c) => c.charCodeAt(0))
  const blob = new Blob([bytes], { type: "image/jpeg" })
  const url = URL.createObjectURL(blob)
  els.cam.src = url
  els.camWrap.classList.add("live")
  if (camObjectUrl) URL.revokeObjectURL(camObjectUrl)
  camObjectUrl = url
  if (typeof msg.centerDepth === "number" && msg.centerDepth > 0) {
    els.vDepth.textContent = msg.centerDepth.toFixed(2) + " m"
  }
}

// ── three.js lidar point cloud ──
const MAX_POINTS = 30000
let renderer, scene, camera3d, controls, cloudGeom, cloudPoints, cloudPositions, cloudColors
function initLidar() {
  renderer = new THREE.WebGLRenderer({ canvas: els.lidarCanvas, antialias: true, alpha: true })
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2))
  scene = new THREE.Scene()
  camera3d = new THREE.PerspectiveCamera(55, 1, 0.05, 200)
  camera3d.up.set(0, 0, 1) // z-up to match the robot frame
  camera3d.position.set(-3.4, -3.4, 2.6)
  controls = new OrbitControls(camera3d, renderer.domElement)
  controls.enableDamping = true; controls.dampingFactor = 0.12
  controls.target.set(0, 0, 0.4)

  // ground grid + origin (robot) marker
  const grid = new THREE.GridHelper(16, 16, 0x2a3a52, 0x18222f)
  grid.rotation.x = Math.PI / 2 // GridHelper is xz by default; lay it in xy
  scene.add(grid)
  const robot = new THREE.Mesh(
    new THREE.ConeGeometry(0.16, 0.5, 4),
    new THREE.MeshBasicMaterial({ color: 0x45e0ff }))
  robot.rotation.x = Math.PI / 2
  robot.position.z = 0.25
  scene.add(robot)

  cloudGeom = new THREE.BufferGeometry()
  cloudPositions = new Float32Array(MAX_POINTS * 3)
  cloudColors = new Float32Array(MAX_POINTS * 3)
  cloudGeom.setAttribute("position", new THREE.BufferAttribute(cloudPositions, 3))
  cloudGeom.setAttribute("color", new THREE.BufferAttribute(cloudColors, 3))
  cloudGeom.setDrawRange(0, 0)
  cloudPoints = new THREE.Points(cloudGeom,
    new THREE.PointsMaterial({ size: 0.035, vertexColors: true, sizeAttenuation: true }))
  scene.add(cloudPoints)

  resizeLidar()
  const loop = () => { controls.update(); renderer.render(scene, camera3d); requestAnimationFrame(loop) }
  requestAnimationFrame(loop)
}
function resizeLidar() {
  const rect = els.lidarCanvas.getBoundingClientRect()
  if (rect.width < 2 || rect.height < 2) return
  renderer.setSize(rect.width, rect.height, false)
  camera3d.aspect = rect.width / rect.height
  camera3d.updateProjectionMatrix()
}
function onLidar(msg) {
  els.lidarM.textContent = `${(msg.points / 1000).toFixed(0)}k pts`
  els.vPts.textContent = msg.points ? (msg.points).toLocaleString() : "—"
  if (typeof msg.nearest === "number" && msg.nearest > 0) {
    els.vNear.textContent = msg.nearest.toFixed(2) + " m"
    els.vNear.className = "v" + (msg.nearest < 0.6 ? " near" : "")
  }
  const flat = msg.cloud || []
  const n = Math.min(flat.length / 3 | 0, MAX_POINTS)
  for (let i = 0; i < n; i++) {
    const x = flat[i * 3], y = flat[i * 3 + 1], z = flat[i * 3 + 2]
    cloudPositions[i * 3] = x; cloudPositions[i * 3 + 1] = y; cloudPositions[i * 3 + 2] = z
    // color by height: low = blue, high = cyan/white
    const t = Math.max(0, Math.min(1, (z + 0.5) / 2.5))
    cloudColors[i * 3] = 0.15 + 0.5 * t
    cloudColors[i * 3 + 1] = 0.6 + 0.35 * t
    cloudColors[i * 3 + 2] = 0.9
  }
  cloudGeom.attributes.position.needsUpdate = true
  cloudGeom.attributes.color.needsUpdate = true
  cloudGeom.setDrawRange(0, n)
}
els.lidarExpand.onclick = () => {
  const big = els.lidarCard.classList.toggle("big")
  els.lidarExpand.textContent = big ? "Shrink" : "Expand"
  requestAnimationFrame(resizeLidar)
}
addEventListener("resize", () => requestAnimationFrame(resizeLidar))

// ── driving: keyboard + d-pad → throttled "move" ──
const keys = { fwd: false, back: false, sl: false, sr: false, tl: false, tr: false, boost: false }
let lastSent = { vx: 0, vy: 0, omega: 0 }
let sendTimer = null

function computeVel() {
  const k = keys.boost ? BOOST : 1
  let vx = (keys.fwd ? 1 : 0) - (keys.back ? 1 : 0)
  let vy = (keys.sl ? 1 : 0) - (keys.sr ? 1 : 0)
  let omega = (keys.tl ? 1 : 0) - (keys.tr ? 1 : 0)
  return { vx: vx * MAX_VX * k, vy: vy * MAX_VY * k, omega: omega * MAX_OMEGA * k }
}
function driving() { return keys.fwd || keys.back || keys.sl || keys.sr || keys.tl || keys.tr }
function showVel(v) {
  els.vx.textContent = v.vx.toFixed(2); els.vy.textContent = v.vy.toFixed(2); els.vw.textContent = v.omega.toFixed(2)
  els.vel.classList.toggle("on", driving())
}
function tick() {
  const v = computeVel()
  showVel(v)
  if (helperReady) dimApp.send("move", v)
  lastSent = v
}
function startSending() {
  if (sendTimer) return
  sendTimer = setInterval(tick, 1000 / SEND_HZ)
  tick()
}
function stopSending() {
  clearInterval(sendTimer); sendTimer = null
  const zero = { vx: 0, vy: 0, omega: 0 }
  if (helperReady) dimApp.send("move", zero)
  showVel(zero)
}
function updateDriveState() {
  if (driving()) startSending()
  else if (sendTimer) stopSending()
}

const KEY_MAP = { KeyW: "fwd", KeyS: "back", KeyA: "sl", KeyD: "sr", KeyQ: "tl", KeyE: "tr" }
addEventListener("keydown", (e) => {
  if (e.code === "Space") { e.preventDefault(); dimApp.send("estop", {}); toast("E-STOP — damping"); return }
  if (e.code === "ShiftLeft" || e.code === "ShiftRight") { keys.boost = true; return }
  const dir = KEY_MAP[e.code]
  if (!dir || keys[dir]) return
  keys[dir] = true; updateDriveState()
})
addEventListener("keyup", (e) => {
  if (e.code === "ShiftLeft" || e.code === "ShiftRight") { keys.boost = false; return }
  const dir = KEY_MAP[e.code]
  if (!dir) return
  keys[dir] = false; updateDriveState()
})
// release everything if the panel loses focus mid-drive (safety)
addEventListener("blur", () => { for (const k in keys) keys[k] = false; if (sendTimer) stopSending() })

// on-screen d-pad: press-and-hold mirrors the keys
for (const btn of document.querySelectorAll(".db[data-drive]")) {
  const dir = btn.dataset.drive
  const press = (e) => { e.preventDefault(); keys[dir] = true; btn.classList.add("held"); updateDriveState() }
  const release = () => { keys[dir] = false; btn.classList.remove("held"); updateDriveState() }
  btn.addEventListener("pointerdown", press)
  btn.addEventListener("pointerup", release)
  btn.addEventListener("pointerleave", release)
  btn.addEventListener("pointercancel", release)
}
document.getElementById("db-stop").onclick = () => { for (const k in keys) keys[k] = false
  for (const b of document.querySelectorAll(".db.held")) b.classList.remove("held"); if (sendTimer) stopSending() }

// ── boot ──
initLidar()
renderLink()
dimApp.send("hello", {}) // ask the backend to replay current status
</script>
</body>
</html>
